<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>One Piece: Grand Line Quiz</title>
    <style>
        :root { --gold: #f1c40f; --red: #e74c3c; --blue: #2980b9; --dark: #1a1a1a; --parchment: #f3e5ab; }
        body { font-family: 'Arial Black', sans-serif; margin: 0; background: #000; color: white; overflow: hidden; text-align: center; touch-action: manipulation; }
        
        /* Welcome Screen */
        .screen { display: none; height: 100vh; flex-direction: column; align-items: center; justify-content: center; padding: 15px; box-sizing: border-box; background: radial-gradient(circle, #2c3e50 0%, #000 100%); }
        .active { display: flex !important; }
        #scr-start { background: url('https://i.imgur.com/mO16S09.jpg') center/cover; }
        .welcome-box { background: rgba(0,0,0,0.7); padding: 30px; border: 5px solid var(--gold); border-radius: 20px; box-shadow: 0 0 20px var(--gold); }
        
        /* Character Selection - Bounty Posters */
        .char-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        .card { background: var(--parchment); padding: 10px; border: 4px solid #5d4037; width: 140px; cursor: pointer; transition: 0.3s; color: #5d4037; box-shadow: 5px 5px 15px rgba(0,0,0,0.5); }
        .card img { width: 100%; height: 120px; object-fit: cover; border: 2px solid #5d4037; }
        .card b { display: block; font-size: 1.2rem; margin-top: 5px; text-transform: uppercase; }
        .card.selected { border-color: var(--red); transform: scale(1.1) rotate(-2deg); box-shadow: 0 0 25px var(--red); }

        /* Arena */
        #arena { width: 100%; max-width: 550px; height: 200px; position: relative; background: url('https://i.imgur.com/Z4shDRS.jpg') center/cover; border: 4px solid #fff; border-radius: 20px; overflow: hidden; margin: 10px; }
        #player { width: 80px; position: absolute; bottom: 10px; left: 20px; z-index: 5; transition: 0.2s; }
        #enemy { width: 80px; position: absolute; bottom: 10px; right: -90px; z-index: 4; }

        /* UI Bars */
        .hp-container { width: 100%; max-width: 550px; height: 20px; background: #333; border: 2px solid white; border-radius: 10px; overflow: hidden; margin: 5px; }
        #hp-fill { width: 100%; height: 100%; background: var(--red); transition: 0.3s; }
        
        /* Buttons */
        .main-btn { padding: 15px 40px; background: var(--gold); border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1.4rem; color: #000; box-shadow: 0 5px 0 #b8860b; }
        .mini-btn { padding: 8px 15px; font-size: 0.8rem; background: #7f8c8d; color: white; border: none; border-radius: 5px; cursor: pointer; }
        #haki-btn { display: none; background: #8e44ad; color: white; border: 2px solid white; padding: 10px; border-radius: 20px; font-weight: bold; margin-bottom: 5px; cursor: pointer; }

        .quiz-box { width: 100%; max-width: 550px; background: white; color: black; padding: 15px; border-radius: 20px; border: 5px solid var(--gold); }
        .opt { width: 100%; padding: 12px; margin: 5px 0; border: none; border-radius: 10px; background: var(--blue); color: white; font-weight: bold; cursor: pointer; }
        
        .controls { position: absolute; top: 10px; right: 10px; display: flex; gap: 5px; }
    </style>
</head>
<body>

    <audio id="bgm" loop src="https://www.soundjay.com/free-music/iron-man-01.mp3"></audio>

    <!-- START SCREEN -->
    <div id="scr-start" class="screen active">
        <div class="welcome-box">
            <h1 style="color:var(--gold); font-size: 3rem; margin: 0;">ONE PIECE</h1>
            <h2 style="margin: 0 0 20px 0;">QUIZ SURVIVAL</h2>
            <button class="main-btn" onclick="show('scr-char')">START ADVENTURE</button>
        </div>
    </div>

    <!-- CHARACTER SELECTION -->
    <div id="scr-char" class="screen">
        <h2 style="color:var(--gold)">CHOOSE YOUR CAPTAIN</h2>
        <div class="char-grid">
            <div class="card" id="c-Luffy" onclick="sel('Luffy','https://i.imgur.com/83u3Z6U.png')">
                <img src="https://i.imgur.com/83u3Z6U.png"><b>Luffy</b>
            </div>
            <div class="card" id="c-Zoro" onclick="sel('Zoro','https://i.imgur.com/Wv9NqK4.png')">
                <img src="https://i.imgur.com/Wv9NqK4.png"><b>Zoro</b>
            </div>
            <div class="card" id="c-Nami" onclick="sel('Nami','https://i.imgur.com/K3p8Z6X.png')">
                <img src="https://i.imgur.com/K3p8Z6X.png"><b>Nami</b>
            </div>
            <div class="card" id="c-Sanji" onclick="sel('Sanji','https://i.imgur.com/I7eBf0F.png')">
                <img src="https://i.imgur.com/I7eBf0F.png"><b>Sanji</b>
            </div>
        </div>
        <button id="go-btn" class="main-btn" onclick="start()" style="display:none">SET SAIL!</button>
    </div>

    <!-- GAMEPLAY -->
    <div id="scr-game" class="screen">
        <div class="controls">
            <button class="mini-btn" onclick="start()">RESET</button>
            <button class="mini-btn" style="background:var(--red)" onclick="location.reload()">TERMINATE</button>
        </div>
        <div style="font-weight:bold; color:var(--gold)">Score: <span id="score">0</span></div>
        <div class="hp-container"><div id="hp-fill"></div></div>
        <div id="arena">
            <img id="player" src="">
            <img id="enemy" src="https://i.imgur.com/3N5eNlB.png">
        </div>
        <button id="haki-btn" onclick="doHaki()">HAKI SKIP (-15 PTS)</button>
        <div class="quiz-box"><h3 id="q-txt" style="margin:0 0 10px 0; font-size:1rem;"></h3><div id="opts"></div></div>
    </div>
