<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>One Piece: Grand Line Quiz</title>
    <style>
        :root { --gold: #f1c40f; --red: #e74c3c; --blue: #2980b9; --dark: #1a1a1a; --poster: #f3e5ab; }
        body { font-family: 'Arial Black', sans-serif; margin: 0; background: #000; color: white; overflow: hidden; text-align: center; touch-action: manipulation; }
        .screen { display: none; height: 100vh; flex-direction: column; align-items: center; justify-content: center; padding: 15px; box-sizing: border-box; }
        .active { display: flex !important; }
        
        /* Welcome Screen */
        #scr-start { background: url('https://i.imgur.com/mO16S09.jpg') center/cover; }
        .welcome-box { background: rgba(0,0,0,0.8); padding: 30px; border: 5px solid var(--gold); border-radius: 20px; box-shadow: 0 0 30px var(--gold); }
        
        /* Character Selection */
        .char-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        .card { background: var(--poster); padding: 10px; border: 4px solid #5d4037; width: 130px; cursor: pointer; color: #5d4037; transition: 0.3s; }
        .card img { width: 100%; height: 110px; object-fit: cover; border: 2px solid #5d4037; pointer-events: none; }
        .card.selected { border-color: var(--red); transform: scale(1.1); box-shadow: 0 0 20px var(--red); }

        /* Battle Arena */
        #arena { width: 100%; max-width: 550px; height: 180px; position: relative; background: url('https://i.imgur.com/Z4shDRS.jpg') center/cover; border: 4px solid #fff; border-radius: 20px; overflow: hidden; margin: 10px; }
        #player { width: 70px; position: absolute; bottom: 10px; left: 20px; z-index: 5; transition: 0.2s; }
        #enemy { width: 70px; position: absolute; bottom: 10px; right: -90px; z-index: 4; }

        .hp-bar { width: 100%; max-width: 550px; height: 18px; background: #333; border: 2px solid white; border-radius: 10px; overflow: hidden; margin: 5px; }
        #hp-fill { width: 100%; height: 100%; background: var(--red); transition: 0.3s; }
        
        .main-btn { padding: 15px 40px; background: var(--gold); border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1.3rem; color: #000; }
        .quiz-box { width: 100%; max-width: 550px; background: white; color: black; padding: 15px; border-radius: 20px; border: 5px solid var(--gold); }
        .opt { width: 100%; padding: 12px; margin: 5px 0; border: none; border-radius: 10px; background: var(--blue); color: white; font-weight: bold; cursor: pointer; font-size: 1rem; }
        
        .controls { position: absolute; top: 10px; right: 10px; display: flex; gap: 5px; }
        .mini-btn { padding: 8px 12px; font-size: 0.7rem; background: #7f8c8d; color: white; border: none; border-radius: 5px; cursor: pointer; }
        #haki-btn { display: none; background: #8e44ad; color: white; border: 2px solid white; padding: 10px; border-radius: 20px; font-weight: bold; margin-bottom: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <audio id="bgm" loop src="https://www.soundjay.com/free-music/iron-man-01.mp3"></audio>
    <audio id="sfx" src="https://www.soundjay.com/buttons/button-3.mp3"></audio>

    <div id="scr-start" class="screen active">
        <div class="welcome-box">
            <h1 style="color:var(--gold); margin:0;">ONE PIECE</h1>
            <h2 style="margin:0 0 20px 0;">QUIZ SURVIVAL</h2>
            <button class="main-btn" onclick="show('scr-char')">START MISSION</button>
        </div>
    </div>

    <div id="scr-char" class="screen">
        <h2 style="color:var(--gold)">SELECT YOUR CAPTAIN</h2>
        <div class="char-grid">
            <div class="card" id="c-Luffy" onclick="sel('Luffy','https://i.imgur.com/83u3Z6U.png')"><img src="https://i.imgur.com/83u3Z6U.png"><b>Luffy</b></div>
            <div class="card" id="c-Zoro" onclick="sel('Zoro','https://i.imgur.com/Wv9NqK4.png')"><img src="https://i.imgur.com/Wv9NqK4.png"><b>Zoro</b></div>
            <div class="card" id="c-Nami" onclick="sel('Nami','https://i.imgur.com/K3p8Z6X.png')"><img src="https://i.imgur.com/K3p8Z6X.png"><b>Nami</b></div>
            <div class="card" id="c-Sanji" onclick="sel('Sanji','https://i.imgur.com/I7eBf0F.png')"><img src="https://i.imgur.com/I7eBf0F.png"><b>Sanji</b></div>
        </div>
        <button id="go-btn" class="main-btn" onclick="start()" style="display:none">SET SAIL!</button>
    </div>

    <div id="scr-game" class="screen">
        <div class="controls">
            <button class="mini-btn" onclick="start()">RESET</button>
            <button class="mini-btn" style="background:var(--red)" onclick="location.reload()">TERMINATE</button>
        </div>
        <div style="font-weight:bold; color:var(--gold)">Score: <span id="score">0</span></div>
        <div class="hp-bar"><div id="hp-fill"></div></div>
        <div id="arena"><img id="player" src=""><img id="enemy" src="https://i.imgur.com/3N5eNlB.png"></div>
        <button id="haki-btn" onclick="doHaki()">HAKI SKIP (-15 PTS)</button>
        <div class="quiz-box"><p id="q-txt" style="margin:0; font-weight:bold;"></p><div id="opts"></div></div>
    </div>
