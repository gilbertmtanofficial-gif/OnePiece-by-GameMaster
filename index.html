<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grand Line Survival Quiz</title>
    <style>
        :root { --gold: #f1c40f; --blue: #2980b9; --red: #e74c3c; --dark: #2c3e50; --purple: #8e44ad; }
        body { font-family: 'Arial Black', sans-serif; margin: 0; background: #1a1a1a; color: white; text-align: center; overflow: hidden; touch-action: manipulation; }
        
        .screen { display: none; height: 100vh; flex-direction: column; align-items: center; justify-content: center; padding: 15px; box-sizing: border-box; }
        .active { display: flex !important; }

        /* UI Elements */
        .main-btn { padding: 15px 35px; background: var(--gold); border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1.2rem; color: #000; margin: 10px; transition: 0.2s; }
        .main-btn:active { transform: scale(0.95); }
        .danger-btn { background: var(--red); color: white; padding: 10px 20px; font-size: 0.9rem; }
        .reset-btn { background: #7f8c8d; color: white; padding: 10px 20px; font-size: 0.9rem; }

        /* Character Grid */
        .char-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        .card { background: var(--dark); padding: 15px; border-radius: 15px; border: 4px solid transparent; cursor: pointer; width: 140px; transition: 0.3s; }
        .card span { font-size: 3.5rem; display: block; margin-bottom: 5px; }
        .card.selected { border-color: var(--gold); background: #34495e; transform: translateY(-5px); }

        /* Battle Arena */
        #arena { width: 100%; max-width: 550px; height: 180px; position: relative; background: linear-gradient(to bottom, #3498db, #2980b9); border: 4px solid #fff; border-radius: 20px; overflow: hidden; margin: 10px; }
        #player-sprite { font-size: 4rem; position: absolute; bottom: 10px; left: 15px; z-index: 5; }
        #enemy-sprite { font-size: 4rem; position: absolute; bottom: 10px; right: -80px; z-index: 4; }

        .hp-container { width: 100%; max-width: 550px; height: 18px; background: #444; border: 2px solid white; border-radius: 10px; overflow: hidden; margin: 5px; }
        #hp-fill { width: 100%; height: 100%; background: var(--red); transition: 0.3s; }

        /* Quiz UI */
        .quiz-box { width: 100%; max-width: 550px; background: white; color: #222; padding: 15px; border-radius: 20px; border: 5px solid var(--gold); box-sizing: border-box; }
        .opt { width: 100%; padding: 12px; margin: 6px 0; border: none; border-radius: 10px; background: var(--blue); color: white; font-weight: bold; font-size: 1rem; cursor: pointer; }
        
        #haki-skip { display: none; background: var(--purple); color: white; border: 2px solid white; padding: 8px 15px; border-radius: 20px; font-weight: bold; margin-bottom: 8px; cursor: pointer; }
        
        .game-controls { position: absolute; top: 10px; right: 10px; display: flex; gap: 5px; }
    </style>
</head>
<body>

    <!-- START SCREEN -->
    <div id="scr-start" class="screen active">
        <h1 style="color:var(--gold); font-size: 3rem; margin: 0;">GRAND LINE</h1>
        <h2 style="margin: 0 0 20px 0;">Quiz Survival</h2>
        <button class="main-btn" onclick="show('scr-char')">START MISSION</button>
    </div>

    <!-- CHARACTER SELECTION -->
    <div id="scr-char" class="screen">
        <h2 style="color:var(--gold)">Choose Your Captain</h2>
        <div class="char-grid">
            <div class="card" id="c-Luffy" onclick="sel('Luffy', '🍖')"><span>🍖</span>Luffy</div>
            <div class="card" id="c-Zoro" onclick="sel('Zoro', '⚔️')"><span>⚔️</span>Zoro</div>
            <div class="card" id="c-Nami" onclick="sel('Nami', '☁️')"><span>☁️</span>Nami</div>
            <div class="card" id="c-Sanji" onclick="sel('Sanji', '🔥')"><span>🔥</span>Sanji</div>
        </div>
        <button id="sail-btn" class="main-btn" onclick="startGame()" style="display:none">SET SAIL!</button>
        <button class="main-btn reset-btn" onclick="location.reload()">BACK</button>
    </div>

    <!-- GAMEPLAY SCREEN -->
    <div id="scr-game" class="screen">
        <div class="game-controls">
            <button class="main-btn reset-btn" onclick="resetGame()">RESET</button>
            <button class="main-btn danger-btn" onclick="terminateGame()">TERMINATE</button>
        </div>

        <div style="font-weight:bold; color:var(--gold); font-size: 1.2rem;">Score: <span id="score-val">0</span></div>
        <div class="hp-container"><div id="hp-fill"></div></div>

        <div id="arena">
            <div id="player-sprite"></div>
            <div id="enemy-sprite">🏴‍☠️</div>
        </div>

        <button id="haki-skip" onclick="useHaki()">HAKI SKIP (-15 PTS)</button>

        <div class="quiz-box">
            <p id="q-text" style="margin: 0 0 10px 0; font-weight: bold;"></p>
            <div id="opt-container"></div>
        </div>
    </div>

            {q:"Access without permission", a:["Hacker","User","Admin","Mod"], c:0},
            {q:"Check correct", a:["Verify","Delete","Move","Stop"], c:0},

            {q:"After encryption", a:["Ciphertext","Plain","Logic","Data"], c:0},

            {q:"Data lost due to error", a:["Corrupted","Saved","Moved","Sync"], c:0},
            {q:"Increase in power damage", a:["Power surge","Cut","Short","Drop"], c:0},
            {q:"Nearby device waves", a:["Electrical interference","Noise","Lag","Static"], c:0},
            {q:"Binary digit short", a:["Bit","Byte","Pixel","Unit"], c:0},
            {q:"Group of 8 bits", a:["Bytes","Bits","Megs","Gigs"], c:0},
            {q:"Search other websites", a:["Search engine","Browser","Home","Link"], c:0},
            {q:"Learn from patterns", a:["Machine Learning","Robot","Code","AI"], c:0}
        ];

        let score = 0, hp = 100, active = false, enemyX = -80, speed = 1.6, selectedEmoji = '';
        const enemies = ['🏴‍☠️', '🦑', '🦈', '💣', '🐲'];

        function show(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function sel(name, emoji) {
            document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
            document.getElementById('c-' + name).classList.add('selected');
            selectedEmoji = emoji;
            document.getElementById('sail-btn').style.display = 'inline-block';
        }

        function startGame() {
            score = 0; hp = 100; active = true; enemyX = -80; speed = 1.6;
            document.getElementById('player-sprite').innerText = selectedEmoji;
            show('scr-game');
            updateUI();
            askQuestion();
            requestAnimationFrame(gameLoop);
        }

        function gameLoop() {
            if (!active) return;
            enemyX += speed;
            if (score > 30) speed = 2.4;
            if (score > 70) speed = 3.8;

            if (enemyX > 550) {
                enemyX = -80;
                hp -= 20;
                document.getElementById('enemy-sprite').innerText = enemies[Math.floor(Math.random() * enemies.length)];
            }
            document.getElementById('enemy-sprite').style.right = enemyX + 'px';
            document.getElementById('hp-fill').style.width = hp + '%';

            if (hp <= 0) {
                active = false;
                alert("Game Over! Final Score: " + score);
                show('scr-start');
            } else {
                requestAnimationFrame(gameLoop);
            }
        }

        function askQuestion() {
            const qObj = qs[Math.floor(Math.random() * qs.length)];
            document.getElementById('q-text').innerText = qObj.q;
            const container = document.getElementById('opt-container');
            container.innerHTML = '';

            let choices = qObj.a.map((t, i) => ({ t, correct: i === qObj.c }));
            choices.sort(() => Math.random() - 0.5);

            choices.forEach(choice => {
                const b = document.createElement('button');
                b.className = 'opt';
                b.innerText = choice.t;
                b.onclick = () => {
                    if (choice.correct) {
                        score += 10;
                        enemyX = -100;
                    } else {
                        hp -= 10;
                    }
                    updateUI();
                    askQuestion();
                };
                container.appendChild(b);
            });
        }

        function useHaki() {
            if (score >= 15) {
                score -= 15;
                enemyX = -150;
                updateUI();
                askQuestion();
            }
        }

        function updateUI() {
            document.getElementById('score-val').innerText = score;
            document.getElementById('haki-skip').style.display = (score >= 15) ? 'block' : 'none';
        }

        function resetGame() {
            if (confirm("Reset current game?")) {
                active = false;
                startGame();
            }
        }

        function terminateGame() {
            if (confirm("Stop playing and return to start?")) {
                active = false;
                show('scr-start');
            }
        }
    </script>
</body>
</html>
