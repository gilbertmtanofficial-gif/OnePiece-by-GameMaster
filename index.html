<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>One Piece Quiz Survival</title>
    <style>
        :root { --gold: #f1c40f; --blue: #2980b9; --red: #e74c3c; --dark: #2c3e50; --purp: #8e44ad; }
        body { font-family: 'Arial Black', sans-serif; margin: 0; background: #1a1a1a; color: white; text-align: center; overflow: hidden; touch-action: manipulation; }
        
        /* Navigation Screens */
        .screen { display: none; height: 100vh; flex-direction: column; align-items: center; justify-content: center; padding: 15px; box-sizing: border-box; background: radial-gradient(circle, #2c3e50 0%, #000 100%); }
        .active { display: flex !important; }

        /* Welcome Box */
        .w-box { background: rgba(0,0,0,0.8); padding: 30px; border: 5px solid var(--gold); border-radius: 20px; box-shadow: 0 0 20px var(--gold); }
        
        /* Character Grid */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        .card { background: #34495e; padding: 15px; border-radius: 15px; border: 4px solid transparent; cursor: pointer; width: 130px; transition: 0.2s; }
        .card span { font-size: 3.5rem; display: block; }
        .card.selected { border-color: var(--gold); background: #2c3e50; transform: scale(1.1); }

        /* Battle Arena - Pure CSS Sea */
        #arena { width: 100%; max-width: 550px; height: 180px; position: relative; background: linear-gradient(to bottom, #3498db, #2980b9); border: 4px solid #fff; border-radius: 20px; overflow: hidden; margin: 10px; }
        #player { font-size: 4rem; position: absolute; bottom: 10px; left: 20px; z-index: 5; }
        #enemy { font-size: 4rem; position: absolute; bottom: 10px; right: -80px; z-index: 4; }

        /* Health Bar */
        .hp-bar { width: 100%; max-width: 550px; height: 18px; background: #333; border: 2px solid white; border-radius: 10px; overflow: hidden; margin: 5px; }
        #hp-fill { width: 100%; height: 100%; background: var(--red); transition: 0.3s; }

        /* Quiz UI */
        .quiz { width: 100%; max-width: 550px; background: white; color: #222; padding: 15px; border-radius: 20px; border: 5px solid var(--gold); box-sizing: border-box; }
        .opt { width: 100%; padding: 12px; margin: 6px 0; border: none; border-radius: 10px; background: var(--blue); color: white; font-weight: bold; font-size: 1rem; cursor: pointer; }
        
        /* Controls */
        .main-btn { padding: 15px 40px; background: var(--gold); border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1.4rem; color: #000; }
        .nav { position: absolute; top: 10px; right: 10px; display: flex; gap: 5px; }
        .mini { padding: 8px 12px; font-size: 0.7rem; background: #7f8c8d; color: white; border: none; border-radius: 5px; cursor: pointer; }
        #haki { display: none; background: var(--purp); color: white; border: 2px solid white; padding: 10px; border-radius: 20px; font-weight: bold; margin-bottom: 8px; cursor: pointer; }
    </style>
</head>
<body>

    <!-- SCREEN 1: START -->
    <div id="scr-start" class="screen active">
        <div class="w-box">
            <h1 style="color:var(--gold); margin:0;">ONE PIECE</h1>
            <h2 style="margin:0 0 20px 0;">QUIZ SURVIVAL</h2>
            <button class="main-btn" onclick="show('scr-char')">START MISSION</button>
        </div>
    </div>

    <!-- SCREEN 2: CHAR SELECT -->
    <div id="scr-char" class="screen">
        <h2 style="color:var(--gold)">SELECT YOUR CAPTAIN</h2>
        <div class="grid">
            <div class="card" id="c-Luffy" onclick="sel('Luffy','🍖')"><span>🍖</span>Luffy</div>
            <div class="card" id="c-Zoro" onclick="sel('Zoro','⚔️')"><span>⚔️</span>Zoro</div>
            <div class="card" id="c-Nami" onclick="sel('Nami','☁️')"><span>☁️</span>Nami</div>
            <div class="card" id="c-Sanji" onclick="sel('Sanji','🔥')"><span>🔥</span>Sanji</div>
        </div>
        <button id="go-btn" class="main-btn" onclick="begin()" style="display:none">SET SAIL!</button>
    </div>

    <!-- SCREEN 3: GAMEPLAY -->
    <div id="scr-game" class="screen">
        <div class="nav"><button class="mini" onclick="begin()">RESET</button><button class="mini" style="background:var(--red)" onclick="location.reload()">STOP</button></div>
        <div style="font-weight:bold; color:var(--gold); font-size: 1.2rem;">Score: <span id="score">0</span></div>
        <div class="hp-bar"><div id="hp-fill"></div></div>
        <div id="arena"><div id="player"></div><div id="enemy">🏴‍☠️</div></div>
        <button id="haki" onclick="doHaki()">HAKI SKIP (-15 PTS)</button>
        <div class="quiz"><p id="q-txt" style="margin:0 0 10px 0; font-weight:bold;"></p><div id="opts"></div></div>
    </div>

    <script>
        const qs=[{q:"A fixed amount of money available for a task",a:["Fixed Budget","Fixed Money","Allocation","All"],c:0},{q:"Items bought or sold in an event",a:["Merchandise","Store","Products","Items"],c:0},{q:"Used to organize data stored electronically",a:["Database","Variable","Syntax","Programming"],c:0},{q:"Using rows/columns for calculations",a:["Spreadsheet","Calc","Scientific","Code"],c:0},{q:"Examine in detail to ensure understanding",a:["Analyze","Delete","Create","Save"],c:0},{q:"Replication of real-life environment",a:["Model","Game","Video","Photo"],c:0},{q:"Mathematical calculations expressed with letters",a:["Formulae","Equation","Formula","All"],c:0},{q:"Computerised representation of real situations",a:["Computer Model","Game","Sheet","DB"],c:0},{q:"Key data items in a data model",a:["Factors","Numbers","Letters","Symbols"],c:0},{q:"Field descriptions in database",a:["Field heading","Cell ref","Field","Bar"],c:0},{q:"Using images to illustrate",a:["Graphics","Photo","Art","None"],c:0},{q:"Software to simulate applications",a:["Simulator","Browser","Calc","Editor"],c:0},{q:"Chart representing info visually",a:["Infographic","Photo","Art","Icon"],c:0},{q:"Combo of numbers/symbols to process data",a:["Formula","Formulae","Equation","Syntax"],c:0},{q:"Rows and columns intersection",a:["Cell","Box","Row","Grid"],c:0},{q:"ID for individual cells",a:["Cell reference","Box","Map","ID"],c:0},{q:"Area where formulas are stored",a:["Formula bar","Task bar","Menu","Side"],c:0},{q:"Group of cells (first to last)",a:["Cell range","Group","Block","Set"],c:0},{q:"What is B2:B8?",a:["Cell range","Ref","ID","Name"],c:0},{q:"Address of individual cell",a:["Cell reference","Map","Link","ID"],c:0},{q:"Headings in spreadsheet",a:["Labels","Titles","Names","All"],c:0},{q:"Square used to copy data",a:["Fill handle","Grab","Box","Tool"],c:0},{q:"Instructions for computers",a:["Software","Flowchart","Syntax","Algorithm"],c:0},{q:"Data goes into computer",a:["Input","Output","Process","Store"],c:0},{q:"Computer calculates/thinks",a:["Processing","Input","Output","Store"],c:0},{q:"Computer gives info",a:["Output","Input","Process","Store"],c:0},{q:"Command to output text",a:["Print","Input","Calc","Var"],c:0},{q:"Running a program",a:["Execute","Run","Play","Sim"],c:0},{q:"Memory location for data",a:["Variable","DB","Store","All"],c:0},{q:"Way computer stores data",a:["Data type","File","Folder","Binary"],c:0},{q:"Numbers with decimals",a:["Float","Integer","String","Bool"],c:0},{q:"Whole numbers",a:["Integer","Float","String","Bool"],c:0},{q:"Another name for Float",a:["Real","Fake","Integer","Text"],c:0},{q:"Python function for user strings",a:["Input()","Output","Print","Type"],c:0},{q:"Ensure correct data type",a:["Casting","Formatting","Saving","Print"],c:0},{q:"Steps to solve a problem",a:["Algorithm","Math","Logic","Code"],c:0},{q:"Removing errors",a:["Debugging","Clean","Sort","Code"],c:0},{q:"Approach to testing program",a:["Test plan","Code","Script","Task"],c:0},{q:"One or more paths based on condition",a:["Selection","Loop","Var","Const"],c:0},{q:"Checked for True/False",a:["Decision","Condition","Path","Else"],c:0},{q:"Python grouping",a:["Indention","Space","Dash","Bracket"],c:0},{q:"What is : symbol?",a:["Colon","Semicolon","Dot","Dash"],c:0},{q:"Compare values",a:["Comparison op","Logic","Bool","Math"],c:0},{q:"Mini-program that repeats",a:["Sub-routine","Main","Script","App"],c:0},{q:"Gathers info from surroundings",a:["Sensor","Mouse","Keys","Screen"],c:0},{q:"Parts you can touch",a:["Hardware","Software","Malware","Firm"],c:0},{q:"Detect movement",a:["Accelerometer","Vibrate","Light","Touch"],c:0},{q:"Manages computer system",a:["System software","App","Util","Game"],c:0},{q:"Manages hardware resources",a:["Operating system","Sec","App","Game"],c:0},{q:"General tasks/fun",a:["Application software","System","Util","Sec"],c:0},{q:"True/False with AND/OR",a:["Boolean logic","Math","String","Float"],c:0},{q:"True only if BOTH are True",a:["AND","OR","NOT","XAND"],c:0},{q:"True if EITHER is True",a:["OR","AND","NOT","XAND"],c:0},{q:"Opposite of input",a:["NOT","OR","AND","XAND"],c:0},{q:"What is IP for?",a:["Identify devices","Store","Send","Web"],c:0},{q:"HTTPS?",a:["Hypertext Transfer Secure","High","Home","Link"],c:0},{q:"Encryption purpose",a:["Secure information","Send","Hack","Compress"],c:0},{q:"LAN vs WAN",a:["Local vs Wide","Fast","Old","None"],c:0},{q:"Padlock icon?",a:["Secure","Slow","Bad","Public"],c:0},{q:"SSL function?",a:["Secure data","Accounts","Speed","Fun"],c:0},{q:"Wired network?",a:["Cables","Satellites","Air","Radio"],c:0},{q:"MicroPython?",a:["Microcontrollers","Web","Servers","Apps"],c:0},{q:"Syntax?",a:["Rules for structure","Writing","Math","Apps"],c:0},{q:"Touch sensor?",a:["Touch","Heat","Light","Shake"],c:0},{q:"Power surge error",a:["Interference","Cut","Boom","None"],c:0},{q:"Microbit button?",a:["Trigger events","Light","Display","Code"],c:0},{q:"Firewall primary function",a:["Monitor/Control traffic","Speed","Burn","Virus"],c:0},{q:"Manages network files",a:["Server","PC","USB","Disk"],c:0},{q:"Media over network",a:["Streaming","Saving","Copy","Move"],c:0},{q:"Messaging software",a:["Messaging service","Email","Chat","Video"],c:0},{q:"Provides web pages",a:["Web server","Game","File","Mail"],c:0},{q:"Manages network",a:["Administrator","User","Guest","Bot"],c:0},{q:"Stores digital data",a:["Hard disk drive","Monitor","Keys","CPU"],c:0},{q:"Locate/Access web",a:["Web browser","Server","App","ID"],c:0},{q:"Webpage address",a:["URL","ID","Link","Home"],c:0},{q:"URL?",a:["Uniform Resource Locator","Link","User","Unit"],c:0},{q:"Unique network address",a:["IP address","Home","ID","MAC"],c:0},{q:"IP?",a:["Internet Protocol","Photo","Power","Internal"],c:0},{q:"No duplicates exist",a:["Unique","Original","Solo","All"],c:0},{q:"Device connection method",a:["Connectivity","Link","Cables","Join"],c:0},{q:"Human-like tasks",a:["Artificial Intelligence","Robot","Code","VR"],c:0},{q:"Translate URL to IP",a:["DNS","IP","URL","Web"],c:0},{q:"DNS?",a:["Domain Name System","Digital","Data","Link"],c:0},{q:"Easily moved",a:["Portable","Fixed","Static","Heavy"],c:0},{q:"Raw facts",a:["Data","Info","Logic","Truth"],c:0},{q:"Data transmitted in time",a:["Bandwidth","Speed","Latency","Flow"],c:0},{q:"Uses radio waves",a:["Wifi/Bluetooth","Cable","Ethernet","Disk"],c:0},{q:"How far data goes",a:["Transmission distance","Reach","Speed","Link"],c:0},{q:"WiFi hardware",a:["WiFi Access Point","Router","Keys","Mouse"],c:0},{q:"Signal interruption",a:["Interference","Lag","Gap","Break"],c:0},{q:"Large list password guess",a:["Brute-force","Ransom","Phish","Hack"],c:0},{q:"Bluetooth hacking",a:["Bluesnarfing","Phishing","Spam","Ads"],c:0},{q:"Large list URL checking",a:["Higher-DNS","Low","Mid","Base"],c:0},{q:"DNS not found",a:["404 error","500","200","101"],c:0},{q:"Content displayed in",a:["Display window","URL bar","Task","Menu"],c:0},{q:"Type URL here",a:["Address bar","Task","Search","Menu"],c:0},{q:"SSL?",a:["Secure Socket Layer","Safe","Speed","Super"],c:0},{q:"Website genuine cert",a:["SSL certificate","Key","ID","Pass"],c:0},{q:"HTTPS icon",a:["Padlock","Star","Cross","Circle"],c:0},{q:"Data rules",a:["Protocol","Law","Order","Step"],c:0},{q:"Scramble data",a:["Encryption","Hacking","Copy","Save"],c:0},{q:"Access without permission",a:["Hacker","User","Admin","Mod"],c:0},{q:"Check correct",a:["Verify","Delete","Move","Stop"],c:0},{q:"Before encryption",a:["Plaintext","Code","Cipher","Binary"],c:0},{q:"After encryption",a:["Ciphertext","Plain","Logic","Data"],c:0},{q:"Two number system",a:["Binary","Decimal","Hex","Oct"],c:0},{q:"Data lost due to error",a:["Corrupted","Saved","Moved","Sync"],c:0},{q:"Increase in power damage",a:["Power surge","Cut","Short","Drop"],c:0},{q:"Nearby device waves",a:["Electrical interference","Noise","Lag","Static"],c:0},{q:"Binary digit short",a:["Bit","Byte","Pixel","Unit"],c:0},{q:"Group of 8 bits",a:["Bytes","Bits","Megs","Gigs"],c:0},{q:"Search other websites",a:["Search engine","Browser","Home","Link"],c:0},{q:"Learn from patterns",a:["Machine Learning","Robot","Code","AI"],c:0}];

        let s=0, h=100, act=false, x=-80, v=1.6, pI='';
        const ens=['🏴‍☠️','🦑','🦈','💣','🐲'];

        function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}
        function sel(n,i){pI=i;document.querySelectorAll('.card').forEach(c=>c.classList.remove('selected'));document.getElementById('c-'+n).classList.add('selected');document.getElementById('go-btn').style.display='inline-block'}
        
        function begin(){s=0;h=100;act=true;x=-80;v=1.6;document.getElementById('player').innerText=pI;show('scr-game');upd();ask();loop()}
        
        function loop(){
            if(!act)return; x+=v;
            if(s>30)v=2.4; if(s>70)v=3.8;
            if(x>550){x=-80;h-=20;document.getElementById('enemy').innerText=ens[Math.floor(Math.random()*ens.length)]}
            document.getElementById('enemy').style.right=x+'px';
            document.getElementById('hp-fill').style.width=h+'%';
            if(h<=0){act=false;alert("The Sea Claimed You! Final Score: "+s);show('scr-start')}
            requestAnimationFrame(loop);
        }

        function ask(){
            const obj=qs[Math.floor(Math.random()*qs.length)];
            document.getElementById('q-txt').innerText=obj.q;
            const b=document.getElementById('opts'); b.innerHTML='';
            let ch=obj.a.map((t,i)=>({t,correct:i===obj.c}));
            ch.sort(()=>Math.random()-0.5);
            ch.forEach(c=>{
                const bt=document.createElement('button'); bt.className='opt'; bt.innerText=c.t;
                bt.onclick=()=>{if(c.correct){s+=10;x=-100}else{h-=10}upd();ask()};
                b.appendChild(bt)
            })
        }

        function upd(){document.getElementById('score').innerText=s;document.getElementById('haki').style.display=(s>=15)?'block':'none'}
        function doHaki(){if(s>=15){s-=15;x=-150;upd();ask()}}
    </script>
</body>
</html>
